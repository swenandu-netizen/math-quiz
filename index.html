<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Fun - Smart Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fredoka One', cursive;
            background: #0d2a3a;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            text-align: center;
        }

        .container { width: 95%; max-width: 600px; padding: 20px; }
        h1 { font-size: 34px; color: #FFDE59; text-shadow: 2px 2px #ff5757; }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .category-card {
            padding: 25px 10px;
            border-radius: 20px;
            font-size: 20px;
            cursor: pointer;
            color: white;
            border: none;
            box-shadow: 0 6px 0 rgba(0,0,0,0.3);
        }

        .add { background-color: #FF5757; } 
        .sub { background-color: #5271FF; } 
        .multi { background-color: #7ED957; } 
        .divi { background-color: #FFBD59; } 

        #days-menu { display: none; }

        .days-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        .day-btn {
            background: white;
            color: #0d2a3a;
            padding: 12px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px #ccc;
        }

        .back-btn {
            margin-top: 30px;
            background: #ff5757;
            border: none;
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="main-menu">
            <h1>Math Fun World 🌟</h1>
            <div class="menu-grid">
                <button class="category-card add" onclick="showDays('Addition')">➕ Addition</button>
                <button class="category-card sub" onclick="showDays('Subtraction')">➖ Subtraction</button>
                <button class="category-card multi" onclick="showDays('Multiplication')">✖️ Multiplication</button>
                <button class="category-card divi" onclick="showDays('Division')">➗ Division</button>
            </div>
        </div>

        <div id="days-menu">
            <h1 id="selected-title">Topic</h1>
            <div class="days-grid" id="days-container"></div>
            <button class="back-btn" onclick="goBack()">⬅️ पीछे जाएँ</button>
        </div>
    </div>

    <script>
        // --- सेटिंग्स: यहाँ लिखें कि किस टॉपिक में कितने पेज (Days) तैयार हैं ---
        const quizData = {
            'Addition': { prefix: 'add', count: 5 },       // यहाँ 5 पेज हैं
            'Subtraction': { prefix: 'sub', count: 1 },    // यहाँ अभी सिर्फ 1 पेज है
            'Multiplication': { prefix: 'multi', count: 0 }, // यहाँ अभी 0 (कुछ नहीं दिखेगा)
            'Division': { prefix: 'div', count: 0 }        // यहाँ अभी 0
        };

        function showDays(topic) {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('days-menu').style.display = 'block';
            document.getElementById('selected-title').innerText = topic;

            const container = document.getElementById('days-container');
            container.innerHTML = ""; 

            const data = quizData[topic];

            if (data.count === 0) {
                container.innerHTML = "<p>जल्द आ रहा है... (Coming Soon)</p>";
                return;
            }

            // सिर्फ उतने ही बटन बनेंगे जितना 'count' में लिखा है
            for (let i = 1; i <= data.count; i++) {
                const link = document.createElement('a');
                link.href = `${data.prefix}-day${i}.html`;
                link.className = 'day-btn';
                link.innerHTML = `Day ${i} 🚀`;
                container.appendChild(link);
            }
        }

        function goBack() {
            document.getElementById('main-menu').style.display = 'block';
            document.getElementById('days-menu').style.display = 'none';
        }
    </script>
</body>
</html>
