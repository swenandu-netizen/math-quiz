<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Fun World - Kids Learning</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fredoka One', cursive;
            background: #0d2a3a; /* डार्क ब्लू बैकग्राउंड (आपकी इमेज जैसा) */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 600px;
            padding: 20px;
        }

        h1 { font-size: 36px; color: #FFDE59; text-shadow: 2px 2px #ff5757; margin-bottom: 30px; }

        /* मुख्य मेनू ग्रिड */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .category-card {
            padding: 30px 10px;
            border-radius: 25px;
            font-size: 22px;
            cursor: pointer;
            transition: 0.3s;
            color: white;
            border: none;
            box-shadow: 0 8px 0 rgba(0,0,0,0.2);
        }

        .category-card:active { transform: translateY(8px); box-shadow: none; }

        /* बटन के रंग */
        .add { background-color: #FF5757; } /* Red */
        .sub { background-color: #5271FF; } /* Blue */
        .multi { background-color: #7ED957; } /* Green */
        .divi { background-color: #FFBD59; } /* Orange */

        .icon { font-size: 40px; display: block; margin-bottom: 10px; }

        /* डेज़ मेनू (शुरुआत में छुपा रहेगा) */
        #days-menu { display: none; }

        .days-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .day-btn {
            background: white;
            color: #0d2a3a;
            width: 80%;
            padding: 15px;
            border-radius: 50px;
            font-size: 20px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 5px #ccc;
            transition: 0.2s;
        }

        .day-btn:active { transform: translateY(5px); box-shadow: none; }

        .back-btn {
            margin-top: 30px;
            background: none;
            border: 2px solid white;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="main-menu">
            <h1>Math Fun Quiz 🌟</h1>
            <div class="menu-grid">
                <button class="category-card add" onclick="showDays('Addition')">
                    <span class="icon">➕</span> Addition
                </button>
                <button class="category-card sub" onclick="showDays('Subtraction')">
                    <span class="icon">➖</span> Subtraction
                </button>
                <button class="category-card multi" onclick="showDays('Multiplication')">
                    <span class="icon">✖️</span> Multiplication
                </button>
                <button class="category-card divi" onclick="showDays('Division')">
                    <span class="icon">➗</span> Division
                </button>
            </div>
        </div>

        <div id="days-menu">
            <h1 id="selected-title">Topic</h1>
            <div class="days-list">
                <a href="Add 1.html" class="day-btn">Day 1 🍎</a>
                <a href="#" class="day-btn">Day 2 🍊</a>
                <a href="#" class="day-btn">Day 3 🍇</a>
                <a href="#" class="day-btn">Day 4 🍓</a>
                <a href="#" class="day-btn">Day 5 🍍</a>
            </div>
            <button class="back-btn" onclick="goBack()">⬅️ वापस जाएँ</button>
        </div>

    </div>

    <script>
        function showDays(topic) {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('days-menu').style.display = 'block';
            document.getElementById('selected-title').innerText = topic;
        }

        function goBack() {
            document.getElementById('main-menu').style.display = 'block';
            document.getElementById('days-menu').style.display = 'none';
        }
    </script>

</body>
</html>
