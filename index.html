<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Fun World - Auto Days</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fredoka One', cursive;
            background: #0d2a3a;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            text-align: center;
        }

        .container {
            width: 95%;
            max-width: 600px;
            padding: 20px;
        }

        h1 { font-size: 34px; color: #FFDE59; text-shadow: 2px 2px #ff5757; margin-bottom: 30px; }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .category-card {
            padding: 25px 10px;
            border-radius: 20px;
            font-size: 20px;
            cursor: pointer;
            color: white;
            border: none;
            box-shadow: 0 6px 0 rgba(0,0,0,0.3);
        }

        .category-card:active { transform: translateY(4px); box-shadow: none; }

        .add { background-color: #FF5757; } 
        .sub { background-color: #5271FF; } 
        .multi { background-color: #7ED957; } 
        .divi { background-color: #FFBD59; } 

        .icon { font-size: 35px; display: block; margin-bottom: 5px; }

        /* ऑटो डेज़ मेनू */
        #days-menu { display: none; }

        .days-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* दो कॉलम में डेज़ */
            gap: 12px;
            margin-top: 20px;
        }

        .day-btn {
            background: white;
            color: #0d2a3a;
            padding: 12px;
            border-radius: 15px;
            font-size: 18px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px #ccc;
            transition: 0.2s;
        }

        .day-btn:active { transform: translateY(3px); box-shadow: none; }

        .back-btn {
            margin-top: 30px;
            background: #ff5757;
            border: none;
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Fredoka One', cursive;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="main-menu">
            <h1>Math Fun World 🌟</h1>
            <div class="menu-grid">
                <button class="category-card add" onclick="generateDays('Addition', 'add')">
                    <span class="icon">➕</span> Addition
                </button>
                <button class="category-card sub" onclick="generateDays('Subtraction', 'sub')">
                    <span class="icon">➖</span> Subtraction
                </button>
                <button class="category-card multi" onclick="generateDays('Multiplication', 'multi')">
                    <span class="icon">✖️</span> Multiplication
                </button>
                <button class="category-card divi" onclick="generateDays('Division', 'div')">
                    <span class="icon">➗</span> Division
                </button>
            </div>
        </div>

        <div id="days-menu">
            <h1 id="selected-title">Topic</h1>
            <div class="days-grid" id="days-container">
                </div>
            <button class="back-btn" onclick="goBack()">⬅️ पीछे जाएँ</button>
        </div>

    </div>

    <script>
        // यहाँ आप संख्या बदल सकते हैं (जैसे 10 की जगह 30 कर सकते हैं)
        const totalDays = 10; 

        function generateDays(topicName, prefix) {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('days-menu').style.display = 'block';
            document.getElementById('selected-title').innerText = topicName;

            const container = document.getElementById('days-container');
            container.innerHTML = ""; // पिछला डेटा साफ़ करें

            // Loop: जो अपने आप बटन बनाएगा
            for (let i = 1; i <= totalDays; i++) {
                const link = document.createElement('a');
                link.href = `${prefix}-day${i}.html`;
                link.className = 'day-btn';
                link.innerHTML = `Day ${i} 🚀`;
                container.appendChild(link);
            }
        }

        function goBack() {
            document.getElementById('main-menu').style.display = 'block';
            document.getElementById('days-menu').style.display = 'none';
        }
    </script>

</body>
</html>
